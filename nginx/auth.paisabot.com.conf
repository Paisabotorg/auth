server {
    listen 80;
    server_name auth.paisabot.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name auth.paisabot.com;

    ssl_certificate     /etc/letsencrypt/live/auth.paisabot.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auth.paisabot.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # CORS is handled by the Node.js app; nginx just proxies
    location / {
        proxy_pass         http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
}
